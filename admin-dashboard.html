<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Moderator Dashboard</title>

        <link rel="stylesheet" href="css/admin-dashboard.css">
        <link rel="stylesheet" href="css/darkmode.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo-placeholder"></div>
                <span class="logo-text"> WhatsUpDLSU </span>
            </div>

            <div class="nav-right">
                <div class="nav-links">
                    <a href="admin-dashboard.html" class="nav-tab active"> Manage </a>
                    <a href="admin-create.html" class="nav-tab"> Create </a>
                </div>

                <div class="profile-section">
                    <button class="profile-btn" id="profileBtn"> Moderator ▼ </button>

                    <div class="dropdown-menu" id="dropdownMenu">
                        <button class="dark-mode-btn"> DARK/LIGHT MODE </button>
                        <button> EDIT USER DETAILS </button>
                        <button onclick="location.href='admin-login.html'"> LOG OUT </button>
                    </div>
                </div>
            </div>
        </nav>

        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search Events" class="search-input" >
            <input type="date" class="filter-box">

            <select class="filter-box">
                <option>Category</option>
                <option>Academic</option>
                <option>Career</option>
                <option>Non-Academic</option>
            </select>

            <select class="filter-box">
                <option>Status</option>
                <option>Pending</option>
                <option>Approved</option>
                <option>Rejected</option>
            </select>

        </section>

        <main class="manage-container">

            <div class="status-column">
                <div class="column-header pending-header"> Pending </div> 
                <div class="event-card pending">
                    <h3>Next Event</h3>
                    <p>Status: Pending</p>
                </div>

                <div class="event-card pending">
                    <h3>Next Event</h3>
                    <p>Status: Pending</p>
                </div>
            </div>


            <div class="status-column">
                <div class="column-header approved-header"> Approved </div>
                <div class="event-card approved">
                    <h3>Next Event</h3>
                    <p>Status: Approved</p>
                </div>

                <div class="event-card approved">
                    <h3>Next Event</h3>
                    <p>Status: Approved</p>
                </div>
            </div>

            <div class="status-column">
                <div class="column-header rejected-header"> Rejected </div>
                <div class="event-card rejected">
                    <h3>Next Event</h3>
                    <p>Status: Rejected</p>
                </div>

                <div class="event-card rejected">
                    <h3>Next Event</h3>
                    <p>Status: Rejected</p>
                </div>
            </div>
        </main>

        <script src="js/admin-dashboard.js"></script>
        <script src="js/darkmode.js"></script>

    </body>
</html>
